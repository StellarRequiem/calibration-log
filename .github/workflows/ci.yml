name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q
      - name: Dogfood the controller — the committed track must pass its own gate
        run: python -m calibration_log verify --track yggdrasil
